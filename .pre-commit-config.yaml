---
default_stages:
  - pre-commit

default_install_hook_types:
  - commit-msg
  - pre-commit
  - prepare-commit-msg

default_language_version:
  python: python3.14

repos:
  # https://github.com/pre-commit/pre-commit-hooks/tags
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-vcs-permalinks
      - id: destroyed-symlinks
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: forbid-submodules
      - id: trailing-whitespace
        exclude: "^\\.gitignore$"

  # https://github.com/prettier/prettier/tags
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: prettier --write --list-different --ignore-unknown
        language: node
        types: [text]
        exclude: "^project/"
        additional_dependencies:
          - "prettier@3.8.3"

  # https://github.com/igorshubovych/markdownlint-cli/tags
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: "v0.48.0"
    hooks:
      - id: markdownlint-fix
        name: markdownlint

  # https://github.com/adrienverge/yamllint/tags
  - repo: https://github.com/adrienverge/yamllint
    rev: "v1.38.0"
    hooks:
      - id: yamllint
        entry: yamllint --strict

  # https://github.com/pecigonzalo/pre-commit-shfmt/tags
  - repo: https://github.com/pecigonzalo/pre-commit-shfmt
    rev: "v2.2.0"
    hooks:
      - id: shell-fmt-go

  # https://github.com/koalaman/shellcheck-precommit/tags
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: "v0.11.0"
    hooks:
      - id: shellcheck
        name: shellcheck

  # https://github.com/rhysd/actionlint/tags
  - repo: https://github.com/rhysd/actionlint
    rev: "v1.7.12"
    hooks:
      - id: actionlint-docker
        name: actionlint

  # https://github.com/bridgecrewio/checkov/tags
  - repo: https://github.com/bridgecrewio/checkov
    rev: "3.2.529"
    hooks:
      - id: checkov
        name: checkov
        args: [--config-file=.checkov.yml]

  # https://github.com/jorisroovers/gitlint/tags
  - repo: https://github.com/jorisroovers/gitlint
    rev: "v0.19.1"
    hooks:
      - id: gitlint

  # https://github.com/tofuutils/pre-commit-opentofu/tags
  - repo: https://github.com/tofuutils/pre-commit-opentofu
    rev: "v2.3.0"
    hooks:
      - id: tofu_fmt
        name: tofu-fmt
      - id: tofu_validate
        name: tofu-validate
        args:
          - --hook-config=--retry-once-with-cleanup=true
          - --tf-init-args=-upgrade
      - id: tofu_providers_lock
        name: tofu-providers-lock
        args:
          - --hook-config=--mode=always-regenerate-lockfile
          - --args=-platform=darwin_amd64
          - --args=-platform=darwin_arm64
          - --args=-platform=linux_amd64
          - --args=-platform=linux_arm64
