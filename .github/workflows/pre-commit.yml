---
name: pre-commit

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  actions: none
  checks: none
  contents: read
  deployments: none
  discussions: none
  id-token: none
  issues: none
  packages: none
  pages: none
  pull-requests: none
  repository-projects: none
  security-events: none
  statuses: none

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout/releases
        uses: actions/checkout@v6.0.2

      - name: Setup SSH agent
        # https://github.com/webfactory/ssh-agent/releases
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: "${{ secrets.DEPLOY_USER_SSH_KEY }}"

      - name: Setup Git
        run: |
          curl -f -sL --retry 5 --retry-delay 1 https://api.github.com/meta | jq -r '"github.com "+.ssh_keys[]' >> ~/.ssh/known_hosts
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git config --global advice.detachedHead false

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Setup OpenTofu
        # https://github.com/opentofu/setup-opentofu/releases
        uses: opentofu/setup-opentofu@v2.0.1

      - name: Cache Terraform providers
        # https://github.com/actions/cache/releases
        uses: actions/cache@v5.0.5
        with:
          path: .terraform
          key: "${{ runner.os }}-terraform-${{ hashFiles('**/.terraform.lock.hcl') }}"

      - name: Load envrc
        # https://github.com/HatsuneMiku3939/direnv-action/releases
        uses: HatsuneMiku3939/direnv-action@v1.3.4

      - name: Install project dependencies
        run: make install
        env:
          TF_INIT_FLAGS: -backend=false

      - name: Run pre-commit checks
        # https://github.com/pre-commit/action/releases
        uses: pre-commit/action@v3.0.1
